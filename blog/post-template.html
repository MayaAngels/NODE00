<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{TITLE} | Ω-Conditions Blog</title>
    <meta name="description" content="{DESCRIPTION}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0a0a0a; color: #fff; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #00cc66; margin: 20px 0; }
        .date { color: #666; margin-bottom: 40px; font-size: 14px; }
        .content { line-height: 1.8; color: #ddd; }
        .content h2 { color: #00cc66; margin: 30px 0 15px; }
        .content p { margin-bottom: 20px; }
        .back-link { display: inline-block; margin-top: 40px; color: #00cc66; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/blog" class="back-link">← Voltar para o blog</a>
        <h1>{TITLE}</h1>
        <div class="date">{DATE}</div>
        <div class="content">
            {CONTENT}
        </div>
    </div>
</body>
</html>
