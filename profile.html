<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Ω-Conditions V3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0a0a0a; color: #fff; }
        .header { background: #1a1a1a; padding: 20px; border-bottom: 1px solid #333; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .profile-card { background: #1a1a1a; border-radius: 24px; padding: 32px; border: 1px solid #333; margin-bottom: 24px; }
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 32px; flex-wrap: wrap; }
        .avatar { width: 80px; height: 80px; background: linear-gradient(135deg, #00cc66, #0099ff); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; }
        .profile-info h2 { color: #00cc66; margin-bottom: 4px; }
        .profile-info p { color: #aaa; font-size: 14px; }
        .section-title { color: #00cc66; margin-bottom: 20px; font-size: 18px; border-left: 3px solid #00cc66; padding-left: 12px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #aaa; margin-bottom: 8px; font-size: 14px; }
        input, select { width: 100%; padding: 12px 16px; background: #0a0a0a; border: 1px solid #333; border-radius: 12px; color: #fff; font-size: 14px; }
        input:focus, select:focus { outline: none; border-color: #00cc66; }
        .btn-save { background: #00cc66; color: #000; padding: 12px 24px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 16px; }
        .btn-danger { background: #ff4444; color: #fff; padding: 12px 24px; border: none; border-radius: 12px; cursor: pointer; margin-top: 16px; margin-left: 12px; }
        .message { padding: 12px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .message.success { background: rgba(0,204,102,0.1); border: 1px solid #00cc66; color: #00cc66; }
        .message.error { background: rgba(255,0,0,0.1); border: 1px solid #ff4444; color: #ff6666; }
        .nav-links { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .nav-links a { color: #fff; text-decoration: none; }
        .nav-links a:hover { color: #00cc66; }
        .btn-logout { background: #ff4444; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
            <div class="logo">🔮 Ω-Conditions V3</div>
            <div class="nav-links">
                <a href="/dashboard-user.html">Dashboard</a>
                <a href="/profile.html">Profile</a>
                <a href="/">Home</a>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>
    <div class="container">
        <div id="message" class="message"></div>
        
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar" id="avatarEmoji">👤</div>
                <div class="profile-info">
                    <h2 id="userName">Loading...</h2>
                    <p id="userEmail">-</p>
                    <p>Member since <span id="memberSince">-</span></p>
                </div>
            </div>
        </div>

        <div class="profile-card">
            <h3 class="section-title">📝 Edit Profile</h3>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="editName" placeholder="Your name">
            </div>
            <div class="form-group">
                <label>Bio</label>
                <input type="text" id="editBio" placeholder="Tell us about yourself">
            </div>
            <button class="btn-save" onclick="updateProfile()">Save Changes</button>
        </div>

        <div class="profile-card">
            <h3 class="section-title">⚙️ Preferences</h3>
            <div class="form-group">
                <label>Theme</label>
                <select id="prefTheme">
                    <option value="dark">Dark (Recommended)</option>
                    <option value="light">Light</option>
                    <option value="auto">Auto (System)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Language</label>
                <select id="prefLanguage">
                    <option value="en">English</option>
                    <option value="pt">Português</option>
                    <option value="es">Español</option>
                </select>
            </div>
            <div class="form-group">
                <label>Email Notifications</label>
                <select id="prefNotifications">
                    <option value="true">Enabled</option>
                    <option value="false">Disabled</option>
                </select>
            </div>
            <button class="btn-save" onclick="savePreferences()">Save Preferences</button>
        </div>

        <div class="profile-card">
            <h3 class="section-title">🔐 Account Settings</h3>
            <div class="form-group">
                <label>Change Password</label>
                <input type="password" id="newPassword" placeholder="New password">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm new password">
            </div>
            <button class="btn-save" onclick="changePassword()">Update Password</button>
            <button class="btn-danger" onclick="deleteAccount()">Delete Account</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentToken = null;

        async function loadProfile() {
            const token = localStorage.getItem('session_token');
            if (!token) {
                window.location.href = '/auth.html';
                return;
            }
            currentToken = token;

            const response = await fetch('/api/verify-session', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await response.json();

            if (!data.valid) {
                localStorage.removeItem('session_token');
                window.location.href = '/auth.html';
                return;
            }

            currentUser = data.user;
            document.getElementById('userName').innerText = data.user.name;
            document.getElementById('userEmail').innerText = data.user.email;
            document.getElementById('memberSince').innerText = data.user.created_at || '2026';
            document.getElementById('editName').value = data.user.name;
            document.getElementById('editBio').value = data.user.bio || '';
            document.getElementById('prefTheme').value = data.user.preferences?.theme || 'dark';
            document.getElementById('prefLanguage').value = data.user.preferences?.language || 'en';
            document.getElementById('prefNotifications').value = data.user.preferences?.notifications !== false ? 'true' : 'false';
            
            // Set avatar emoji based on name
            const firstLetter = (data.user.name || 'U').charAt(0).toUpperCase();
            document.getElementById('avatarEmoji').innerText = firstLetter;
        }

        async function updateProfile() {
            const name = document.getElementById('editName').value;
            const bio = document.getElementById('editBio').value;

            const response = await fetch('/api/update-profile', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + currentToken
                },
                body: JSON.stringify({ name: name, bio: bio })
            });
            const data = await response.json();

            if (data.success) {
                showMessage('Profile updated successfully!', 'success');
                loadProfile();
            } else {
                showMessage(data.message || 'Error updating profile', 'error');
            }
        }

        async function savePreferences() {
            const theme = document.getElementById('prefTheme').value;
            const language = document.getElementById('prefLanguage').value;
            const notifications = document.getElementById('prefNotifications').value === 'true';

            const response = await fetch('/api/save-preferences', {
                method: 'POST',
                headers: { 
                    'Content-Type':application/json',
                    'Authorization': 'Bearer ' + currentToken
                },
                body: JSON.stringify({ theme: theme, language: language, notifications: notifications })
            });
            const data = await response.json();

            if (data.success) {
                showMessage('Preferences saved!', 'success');
            } else {
                showMessage('Error saving preferences', 'error');
            }
        }

        async function changePassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (newPassword !== confirm) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            if (newPassword.length < 4) {
                showMessage('Password must be at least 4 characters', 'error');
                return;
            }

            const response = await fetch('/api/change-password', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + currentToken
                },
                body: JSON.stringify({ password: newPassword })
            });
            const data = await response.json();

            if (data.success) {
                showMessage('Password changed successfully!', 'success');
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
            } else {
                showMessage(data.message || 'Error changing password', 'error');
            }
        }

        async function deleteAccount() {
            if (confirm('Are you sure? This action cannot be undone. All your data will be deleted.')) {
                const response = await fetch('/api/delete-account', {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + currentToken }
                });
                const data = await response.json();

                if (data.success) {
                    localStorage.removeItem('session_token');
                    window.location.href = '/auth.html';
                } else {
                    showMessage('Error deleting account', 'error');
                }
            }
        }

        function showMessage(msg, type) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = `message ${type}`;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 3000);
        }

        function logout() {
            localStorage.removeItem('session_token');
            window.location.href = '/auth.html';
        }

        loadProfile();
    </script>
</body>
</html>
